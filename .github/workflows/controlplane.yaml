name: Controlplane
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "cmd/enroller/Dockerfile"
      - "cmd/auth-server/Dockerfile"
      - "go.mod"
      - "**.go"
      - ".github/workflows/controlplane.yaml"
      - "packaging/controlplane/**"
env:
  REGISTRY: europe-north1-docker.pkg.dev/nais-io/nais/images

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        mise_task:
          - check:golangci-lint
          - check:govet
          - check:govulncheck
          - check:ratchet
          - check:staticcheck
          - ci:fmt
          - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v3
        with:
          cache: false
      - run: mise run ${{ matrix.mise_task }}

  build_debs:
    name: Build debs
    needs:
      - test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v3

      - name: "Build controlplane"
        run: |
          export VERSION="$(date "+%Y-%m-%d-%H%M%S")"
          mise run package:controlplane-debs

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3

      - name: "Auth with Google"
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # ratchet:google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GOOGLE_DEB_UPLOAD_SA_JSON }}"

      - name: "Upload controlplane deb files to repository"
        run: |
          gcloud artifacts apt upload controlplane --source apiserver.deb --location europe-north1 --quiet
          gcloud artifacts apt upload controlplane --source gateway-agent.deb --location europe-north1 --quiet
          gcloud artifacts apt upload controlplane --source prometheus-agent.deb --location europe-north1 --quiet

  build_enroller:
    name: Build enroller
    needs:
      - test
    permissions:
      contents: "read"
      id-token: "write"
      packages: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # ratchet:google-github-actions/setup-gcloud@v3

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # ratchet:google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: "gh-naisdevice@nais-io.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Login to registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # ratchet:docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - name: Get Go version from go.mod
        id: go-version
        run: echo "version=$(awk '/^go /{print $2}' go.mod)" >> "$GITHUB_OUTPUT"

      - uses: nais/platform-build-push-sign@df590279b21bc5978519685752f9eaddd546043c # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: naisdevice-enroller
          dockerfile: cmd/enroller/Dockerfile
          google_service_account: gh-naisdevice
          push: ${{ github.actor != 'dependabot[bot]' }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          build_args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
          cache_from: type=registry,ref=${{ env.cache_ref }}
          cache_to: type=gha,ref=${{ env.cache_ref }},mode=max

  build_auth_server:
    name: Build auth-server
    needs:
      - test
    permissions:
      contents: "read"
      id-token: "write"
      packages: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Get Go version from go.mod
        id: go-version
        run: echo "version=$(awk '/^go /{print $2}' go.mod)" >> "$GITHUB_OUTPUT"

      - uses: nais/platform-build-push-sign@df590279b21bc5978519685752f9eaddd546043c # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: naisdevice-auth-server
          dockerfile: cmd/auth-server/Dockerfile
          google_service_account: gh-naisdevice
          push: ${{ github.actor != 'dependabot[bot]' }}
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          build_args: |
            GO_VERSION=${{ steps.go-version.outputs.version }}
          cache_from: type=registry,ref=${{ env.cache_ref }}
          cache_to: type=gha,ref=${{ env.cache_ref }},mode=max
